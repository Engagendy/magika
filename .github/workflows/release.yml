name: Build And Publish NuGet

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the generated package to nuget.org
        required: true
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-native:
    name: Build Native (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            runner: ubuntu-latest
            lib_name: libmagika_dotnet.so
          - rid: win-x64
            runner: windows-latest
            lib_name: magika_dotnet.dll
          - rid: osx-arm64
            runner: macos-latest
            lib_name: libmagika_dotnet.dylib

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Rust (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v cargo >/dev/null 2>&1; then
            curl https://sh.rustup.rs -sSf | sh -s -- -y
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Rust (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command cargo -ErrorAction SilentlyContinue)) {
            Invoke-WebRequest https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-toolchain stable --default-host x86_64-pc-windows-msvc
          }
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build native library
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release

      - name: Stage native runtime asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "artifact/${{ matrix.rid }}/native"
          cp "target/release/${{ matrix.lib_name }}" "artifact/${{ matrix.rid }}/native/${{ matrix.lib_name }}"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: artifact/${{ matrix.rid }}/
          if-no-files-found: error

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: build-native

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download native artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: native-*
          merge-multiple: true
          path: dotnet/Magika.Native/runtimes

      - name: Show packaged runtimes
        shell: bash
        run: |
          set -euo pipefail
          find dotnet/Magika.Native/runtimes -type f | sort

      - name: Pack NuGet
        shell: bash
        run: |
          set -euo pipefail
          dotnet pack dotnet/Magika.Native/Magika.Native.csproj -c Release

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: |
            dotnet/Magika.Native/bin/Release/*.nupkg
            dotnet/Magika.Native/bin/Release/*.snupkg
          if-no-files-found: error

  publish:
    name: Publish NuGet
    runs-on: ubuntu-latest
    needs: pack
    if: github.event_name == 'push' || inputs.publish
    environment: nuget

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download NuGet package
        uses: actions/download-artifact@v5
        with:
          name: nuget-package
          path: out

      - name: Push package to nuget.org
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          dotnet nuget push "out/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate
